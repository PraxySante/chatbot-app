# HTTP server to redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name centre-iridis.praxysante.fr www.centre-iridis.praxysante.fr;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name centre-iridis.praxysante.fr www.centre-iridis.praxysante.fr;

    # SSL certificate files
    ssl_certificate /etc/ssl/private/praxysante_fr/praxysante_fr.cert;
    ssl_certificate_key /etc/ssl/private/praxysante_fr/praxysante_fr.key;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (optional, but recommended)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Logs
    access_log /var/log/nginx/centre-iridis.praxysante.fr.access.log;
    error_log /var/log/nginx/centre-iridis.praxysante.fr.error.log;

    # Proxy settings
    location = /index.html {
      proxy_pass http://localhost:5000;
      proxy_set_header Host $host;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_intercept_errors on;
        error_page 404 /index.html;
     }

     location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ----------- CONFIG DEV -----------
    location = /dev/index.html {
      rewrite ^/dev(/.*)$ $1 break;
      proxy_pass http://localhost:5002;
      proxy_set_header Host $host;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /dev/ {
        rewrite ^/dev(/.*)$ $1 break;
        proxy_pass http://localhost:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_intercept_errors on;
        error_page 404 /dev/index.html;
    }

    location /dev/api/ {
        rewrite ^/dev(/.*)$ $1 break;
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

}
