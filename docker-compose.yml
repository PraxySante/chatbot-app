version: "3.9"

# Service Backend
services:
  backend:
    build:
      context: ./backend
      args:
        BACKEND_PORT: ${BACKEND_PORT}
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - PORT=${BACKEND_PORT}
    depends_on:
      - redis
    networks:
      - app-network

  # Service Frontend
  frontend:
    build:
      context: ./frontend
      args:
        FRONTEND_PORT: ${FRONTEND_PORT}
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - PORT=${FRONTEND_PORT}
    depends_on:
      - backend
    networks:
      - app-network

  # Service Redis
  redis:
    image: redis:latest
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge