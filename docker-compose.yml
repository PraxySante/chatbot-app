version: "3.9"
services:
  backend:
    build:
      context: ./backend
    container_name: backend
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    environment:
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "3000:80" # Seul le frontend expose un port public

  redis:
    image: redis:latest
    container_name: redis
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
